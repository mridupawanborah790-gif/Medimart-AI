
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <title>Medimart AI - Medical Assistant</title>
    <script>
      window.process = window.process || { env: {} };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #040b09;
        --panel: rgba(10, 26, 22, 0.62);
        --text-main: #e9fff8;
        --text-soft: #a7d7c5;
        --green: #5fffc3;
      }

      html, body {
        height: 100dvh;
        width: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 15% 10%, rgba(95, 255, 195, 0.15), transparent 32%),
          radial-gradient(circle at 85% 90%, rgba(56, 189, 149, 0.12), transparent 35%),
          linear-gradient(160deg, #030908 0%, #040f0d 45%, #020706 100%);
        font-family: 'Manrope', sans-serif;
        color: var(--text-main);
      }

      #root { height: 100dvh; }

      .font-assamese { font-family: 'Noto Sans Bengali', sans-serif; }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(167, 215, 197, 0.35); border-radius: 999px; }

      .app-shell-dark {
        background: linear-gradient(180deg, rgba(9, 21, 18, 0.72), rgba(6, 16, 13, 0.82));
        backdrop-filter: blur(14px);
        box-shadow: 0 18px 70px rgba(0, 0, 0, 0.5);
      }

      .glass-panel-dark {
        background: var(--panel);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .vision-sync-pill {
        padding: 0.4rem 0.8rem;
        border-radius: 999px;
        color: var(--green);
        font-size: 0.72rem;
        border: 1px solid rgba(95, 255, 195, 0.45);
        background: rgba(95, 255, 195, 0.1);
        box-shadow: 0 0 16px rgba(95, 255, 195, 0.35);
      }

      .scanner-frame {
        height: 280px;
        background:
          linear-gradient(180deg, rgba(2, 12, 9, 0.3), rgba(2, 12, 9, 0.82)),
          url('https://images.unsplash.com/photo-1594824476967-48c8b964273f?auto=format&fit=crop&w=1200&q=80') center/cover;
      }

      .scanner-overlay-grid {
        background-image: linear-gradient(rgba(95, 255, 195, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(95, 255, 195, 0.08) 1px, transparent 1px);
        background-size: 30px 30px;
      }

      .scan-bracket {
        position: absolute;
        width: 36px;
        height: 36px;
        border-left: 3px solid rgba(95, 255, 195, 0.95);
        border-top: 3px solid rgba(95, 255, 195, 0.95);
        filter: drop-shadow(0 0 8px rgba(95, 255, 195, 0.7));
      }

      .scan-face-ring {
        position: absolute;
        width: 142px;
        height: 142px;
        border: 2px solid rgba(95, 255, 195, 0.7);
        border-radius: 999px;
        left: 50%;
        top: 46%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 35px rgba(95, 255, 195, 0.28);
      }

      .scan-forehead-dot {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        left: 50%;
        top: 34%;
        transform: translate(-50%, -50%);
        background: rgba(95, 255, 195, 0.95);
        box-shadow: 0 0 20px rgba(95, 255, 195, 0.9);
        animation: pulseGlow 2s ease-in-out infinite;
      }

      .scanner-watermark {
        position: absolute;
        inset: auto 0 24px;
        text-align: center;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        letter-spacing: 0.3em;
        color: rgba(207, 255, 240, 0.28);
        text-shadow: 0 0 25px rgba(95, 255, 195, 0.22);
        animation: watermarkScan 7s linear infinite;
        white-space: nowrap;
      }

      .action-pill-dark {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.62rem 0.5rem;
        font-size: 0.72rem;
        font-weight: 600;
        border-radius: 999px;
        color: var(--text-main);
        border: 1px solid rgba(255,255,255,0.16);
        background: rgba(255,255,255,0.06);
      }

      .action-pill-dark:hover { background: rgba(95, 255, 195, 0.18); }

      .mic-float-btn {
        position: absolute;
        left: 50%;
        bottom: 110px;
        transform: translateX(-50%);
        width: 62px;
        height: 62px;
        border-radius: 999px;
        border: 1px solid rgba(95, 255, 195, 0.5);
        background: radial-gradient(circle at 30% 30%, rgba(140, 255, 213, 0.95), rgba(23, 139, 96, 0.85));
        color: #03271c;
        box-shadow: 0 0 28px rgba(95, 255, 195, 0.5);
      }

      .chat-bubble-model,
      .chat-bubble-user {
        border-radius: 22px;
        padding: 14px 16px;
        border: 1px solid rgba(255,255,255,0.14);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        color: var(--text-main);
      }

      .chat-bubble-model { background: rgba(95, 255, 195, 0.14); border-bottom-left-radius: 8px; }
      .chat-bubble-user { background: rgba(255, 255, 255, 0.07); border-bottom-right-radius: 8px; }

      .prose-chat p, .prose-chat ul, .prose-chat ol {
        color: inherit !important;
        font-size: 0.95rem;
        line-height: 1.55;
      }
      .prose-chat a { color: #7af8ce !important; text-decoration: underline; }
      .prose-chat strong { color: inherit !important; }

      @keyframes watermarkScan {
        0% { transform: translateX(-32%); }
        50% { transform: translateX(32%); }
        100% { transform: translateX(-32%); }
      }

      @keyframes pulseGlow {
        0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      }
    </style>
